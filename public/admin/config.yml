# Sveltia CMS configuration
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: nickpdawson/studioone13
  branch: main
  # Self-hosted OAuth — our Worker at /auth handles the GitHub flow.
  # Without base_url, Sveltia would default to api.netlify.com/auth.
  base_url: https://georgedawsonart.com
  auth_endpoint: /auth
  commit_messages:
    create: 'cms: add {{collection}} "{{slug}}"'
    update: 'cms: update {{collection}} "{{slug}}"'
    delete: 'cms: remove {{collection}} "{{slug}}"'
    uploadMedia: 'cms: upload {{path}}'
    deleteMedia: 'cms: delete {{path}}'

# Where uploaded images live in the repo (relative to repo root)
media_folder: public/paintings
# Where they're served from on the live site (URL path)
public_folder: /paintings

collections:
  # Paintings — the main collection. One markdown file per painting.
  - name: paintings
    label: Paintings
    label_singular: Painting
    folder: src/content/paintings
    create: true
    delete: true
    slug: '{{slug}}'
    summary: '{{title}} ({{medium}}{{#if year}}, {{year}}{{/if}})'
    sortable_fields: [title, year, order]
    view_groups:
      - label: By medium
        field: medium
    fields:
      - { name: title, label: Title, widget: string }
      - name: medium
        label: Medium
        widget: select
        default: 'oil'
        options:
          - { label: 'Oil',           value: 'oil' }
          - { label: 'Watercolor',    value: 'watercolor' }
          - { label: 'Pen and ink',   value: 'pen-and-ink' }
          - { label: 'Pencil',        value: 'pencil' }
          - { label: 'Charcoal',      value: 'charcoal' }
          - { label: 'Pastels',       value: 'pastels' }
          - { label: 'Acrylic',       value: 'acrylic' }
          - { label: 'Mixed media',   value: 'mixed-media' }
      - { name: image, label: Painting photo, widget: image, required: true }
      - { name: year, label: Year painted, widget: number, required: false, value_type: int, min: 1900, max: 2100 }
      - { name: dimensions, label: Dimensions, widget: string, required: false, hint: 'e.g. 12×16 inches' }
      - { name: featured, label: Featured on home page, widget: boolean, default: false, required: false }
      - { name: sold, label: Sold, widget: boolean, default: false, required: false }
      - { name: order, label: Order (lower = first), widget: number, required: false, value_type: int, hint: 'Optional. Leave blank to sort by year.' }
      - { name: body, label: Notes (optional), widget: markdown, required: false, hint: 'A sentence or two about the painting — only shows on the detail page.' }

  # Pages — fixed-file collection. One entry per editable text page.
  # Dad sees "Pages" in the sidebar with three entries: Studio, About,
  # Contact. He can edit them but can't create or delete pages.
  - name: pages
    label: Pages
    files:
      - name: studio
        label: The Studio
        file: src/content/pages/studio.md
        fields:
          - { name: title, label: Page heading, widget: string }
          - { name: lead, label: Lead paragraph, widget: text, required: false, hint: 'One sentence shown right under the heading.' }
          - { name: body, label: Description, widget: markdown }
      - name: about
        label: About
        file: src/content/pages/about.md
        fields:
          - { name: title, label: Page heading, widget: string }
          - { name: lead, label: Lead paragraph, widget: text, required: false }
          - { name: body, label: Bio, widget: markdown }
      - name: contact
        label: Contact
        file: src/content/pages/contact.md
        fields:
          - { name: title, label: Page heading, widget: string }
          - { name: lead, label: Lead paragraph, widget: text, required: false }
          - { name: email, label: Email address, widget: string, required: false, hint: 'Becomes a clickable mailto link.' }
          - { name: body, label: Additional info, widget: markdown, required: false }

  # Upcoming shows — one markdown file per show
  - name: shows
    label: Upcoming Shows
    label_singular: Show
    folder: src/content/shows
    create: true
    delete: true
    slug: '{{slug}}'
    fields:
      - { name: title, label: Show title, widget: string }
      - { name: venue, label: Venue, widget: string }
      - { name: location, label: Location, widget: string, required: false, hint: 'City, state — or wherever' }
      - { name: start_date, label: Start date, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false, picker_utc: false }
      - { name: end_date, label: End date, widget: datetime, required: false, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false, picker_utc: false }
      - { name: link, label: Link (optional), widget: string, required: false }
